<!DOCTYPE html>
<html>
<head>
  <title>DevCommands</title>
  <style>
    body { font-family: sans-serif; }
    .command { margin: 10px 0; }
    .star { cursor: pointer; font-size: 20px; }
    .gold { color: gold; }
    .gray { color: lightgray; }
  </style>
</head>
<body>

<h1>DevCommands</h1>

<input id="search" placeholder="Search commands..." />
<button onclick="loadCommands()">🔍</button>
<button onclick="showAddForm()">➕ Add to API</button>

<div id="commands"></div>

<script>
async function loadCommands() {
  const query = document.getElementById("search").value;
  const res = await fetch(`/api/commands?search=${query}`);
  const data = await res.json();

  const container = document.getElementById("commands");
  container.innerHTML = "";

  data.results.forEach(cmd => {
    const div = document.createElement("div");
    div.className = "command";

    const star = document.createElement("span");
    star.innerText = "★";
    star.className = "star " + (cmd.favorite ? "gold" : "gray");

    star.onclick = async () => {
      await fetch(`/api/commands/${cmd.name}/favorite`, {
        method: "PATCH",
        headers: { "x-user-id": "demo" }
      });
      loadCommands();
    };

    
    div.innerHTML = `
      <strong>${cmd.name}</strong> - ${cmd.description}
      <br/>Difficulty: ${cmd.difficulty}
    `;

    div.prepend(star);
    container.appendChild(div);
  });

  async function showAddForm() {
        await fetch("/api/commands", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name: "new-command",
                description: "Description of the new command",
                difficulty: "Beginner"
                })
            });
            loadCommands();
        }

}
</script>

</body>
</html>
